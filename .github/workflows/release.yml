name: Backend Release

on:
  push:
    tags: [ 'v*.*.*' ]

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_REF: ghcr.io/chatfleetoss/chatfleet-api

jobs:
  build-push-sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to GHCR with PAT (optional)
        env:
          REGISTRY: ${{ env.REGISTRY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          if [ -n "${GHCR_USERNAME}" ] && [ -n "${GHCR_PAT}" ]; then
            echo "Using PAT login for GHCR"
            echo "${GHCR_PAT}" | docker login "${REGISTRY}" -u "${GHCR_USERNAME}" --password-stdin
          else
            echo "No PAT provided; continuing with default token login"
          fi
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.IMAGE_REF }}
          tags: |
            type=ref,event=tag
      - name: Build and push (multi-arch)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_VERSION=${{ github.ref_name }}
            BUILD_COMMIT=${{ github.sha }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ghcr.io/chatfleetoss/chatfleet-api:latest
          labels: ${{ steps.meta.outputs.labels }}
      - name: Enforce published image size budget
        run: python3 scripts/check_ghcr_image_size.py --image-ref ghcr.io/chatfleetoss/chatfleet-api:${{ github.ref_name }} --max-compressed-mb 700
      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac
      - name: Cosign sign (keyless)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: cosign sign --yes ${{ env.IMAGE_REF }}:${{ github.ref_name }}
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
      - name: Trigger infra stable promotion PR
        env:
          GH_TOKEN: ${{ secrets.CHATFLEET_INFRA_TOKEN }}
          API_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            {
              echo "::error title=Missing CHATFLEET_INFRA_TOKEN::Backend releases must dispatch the infra stable promotion workflow so the public curl installer can consume the new API image."
              echo "Create a repository secret named CHATFLEET_INFRA_TOKEN with access to ChatFleetOSS/chatfleet-infra workflows and contents."
            } >&2
            exit 1
          fi

          WEB_TAG="$(
            curl -fsSL https://raw.githubusercontent.com/ChatFleetOSS/chatfleet-infra/main/channels/stable.env \
              | sed -n 's/^WEB_TAG=//p' \
              | tail -n1
          )"
          if [ -z "$WEB_TAG" ]; then
            echo "::error title=Cannot resolve stable web tag::channels/stable.env did not contain WEB_TAG"
            exit 1
          fi

          gh workflow run promote-channel.yml \
            --repo ChatFleetOSS/chatfleet-infra \
            --field channel=stable \
            --field api_tag="$API_TAG" \
            --field web_tag="$WEB_TAG"

          {
            echo "## Infra stable promotion dispatched"
            echo
            echo "The backend release triggered the \`Promote Channel\` workflow in \`chatfleet-infra\`."
            echo
            echo "- channel: \`stable\`"
            echo "- api_tag: \`${API_TAG}\`"
            echo "- web_tag: \`${WEB_TAG}\`"
            echo
            echo "The generated infra PR must pass stable install and upgrade smoke tests before merge."
          } >> "$GITHUB_STEP_SUMMARY"
